<% server_ip = "159.223.192.76" %>
<% app_name = "may_is_bike_month" %>
<% app_host = "secondary.mayisbikemonth.org" %>

# Name of your application. Used to uniquely configure containers.
service: <%= app_name %>

# Name of the container image (use your-user/app-name on external registries).
image: mayisbikemonth/<%= app_name %>

# Deploy to these servers.
servers:
  web:
    - <%= server_ip %>
  worker:
    hosts:
      - <%= server_ip %>
    cmd: bundle exec sidekiq

proxy:
  ssl: true
  host: <%= app_host %>
  healthcheck:
    path: /up

# Where you keep your container images.
registry:
  server: ghcr.io
  username: mayisbikemonth
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - SECRET_KEY_BASE
    - HONEYBADGER_API_KEY
    - POSTGRES_PASSWORD
    - STRAVA_CLIENT_ID
    - STRAVA_SECRET
    - DEVISE_SECRET_KEY
    - DEVISE_PEPPER
  clear:
    POSTGRESQL_ADDRESS: shared-db
    POSTGRESQL_USERNAME: <%= app_name %>
    REDIS_URL: redis://shared-redis:6379/0

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for local Active Storage files.
# Recommended to change this to a mounted volume path that is backed up off server.
volumes:
  - "<%= app_name %>_storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  remote: ssh://root@<%= server_ip %>

# Shared accessories — used by all apps on this server.
# Other apps can define the same accessories (Kamal will skip if already running).
# WARNING: do not run `kamal accessory stop/remove` from any app — it affects all apps.
accessories:
  redis:
    service: shared-redis
    image: redis:7
    host: <%= server_ip %>
    directories:
      - shared_redis_data:/data
  db:
    service: shared-db
    image: postgres:17
    host: <%= server_ip %>
    env:
      secret:
        - POSTGRES_PASSWORD
    directories:
      - shared_db_data:/var/lib/postgresql/data
