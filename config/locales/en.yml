en:
  hello: "Hello world"
  date:
    formats:
      month_date: "%b %-d"
  time:
    formats:
      localize_time: "%FT%T%z"
      hour: "%-l%P"                             # 8pm
      hour_minute: "%-l:%M%P"                   # 8:30pm
      date: "%b %e"                             # Aug 5
      date_year: "%b %e, %Y"                    # Aug 5, 2024
      full_date: "%B %e"                        # August 5
      full_date_year: "%B %e, %Y"               # August 5, 2024
      full_datetime: "%Y-%-m-%-d %-l:%M%P %Z"   # 2025-8-20 8:30pm
      timezone: "%Z"
