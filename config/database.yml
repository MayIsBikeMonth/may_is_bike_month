default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("DB_POOL") { 1000 } %>

default_local: &default_local
  <<: *default
  port: <%= ENV.fetch("PGPORT", 5432) %>
  <% if ENV["CI"] %>
  host: 127.0.0.1
  username: postgres
  password: password
  <% else %>
  host: <%= ENV.fetch("PGHOST", "localhost") %>
  username: <%= ENV["PGUSER"] %>
  password: <%= ENV["PGPASSWORD"] %>
  <% end %>

development:
  <<: *default_local
  database: may_is_bike_month_development<%= ENV["CONDUCTOR_WORKSPACE_NAME"] %>

test:
  <<: *default_local
  database: may_is_bike_month_test<%= ENV["CONDUCTOR_WORKSPACE_NAME"] %><%= ENV["TEST_ENV_NUMBER"] %>

production:
  <<: *default
  database: may_is_bike_month
  host: "<%= ENV["POSTGRESQL_ADDRESS"] %>"
  username: "<%= ENV["POSTGRESQL_USERNAME"] %>"
  password: "<%= ENV["POSTGRESQL_PASSWORD"] %>"
