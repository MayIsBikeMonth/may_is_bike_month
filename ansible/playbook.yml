---
- name: Provisioning webservers group
  hosts: webservers
  gather_facts: false
  vars:
    # Whether to reboot when needed during unattended upgrades.
    security_autoupdate_reboot: "false"
    # The time to trigger a reboot, when needed, if security_autoupdate_reboot is set to true. In 24h "hh:mm" clock format, server local time (UTC by default). 09:00 UTC = 1am PST / 2am PDT.
    security_autoupdate_reboot_time: "09:00"
  roles:
    - wait_for_connection
    - packages
    - docker
    - firewall
    - security
    - geerlingguy.swap
    - reboot_if_needed
