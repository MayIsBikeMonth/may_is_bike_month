name: "CI"

on:
  push: # Run on all pushes
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint_and_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install JS dependencies
        run: npm install

      - name: Lint Ruby for consistent style
        run: bundle exec standardrb --no-fix
        if: success() || failure()

      - name: Lint Ruby with custom rules
        run: bundle exec rubocop -c .rubocop_custom.yml
        if: success() || failure()

      - name: Lint JavaScript
        run: npm run js:lint_check
        if: success() || failure()

      - name: Lint ERB templates
        run: npm run html:lint_check
        if: success() || failure()

      - name: Check ERB formatting
        run: npm run html:format_check
        if: success() || failure()

      - name: Audit gems for known security vulnerabilities
        run: bundle exec bundler-audit --update
        if: success() || failure()

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager
        if: success() || failure()

  test:
    name: "Run tests"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        ports:
          - "5432:5432"
        env:
          POSTGRES_DB: rails_test
          POSTGRES_USER: rails
          POSTGRES_PASSWORD: password
      redis:
        image: redis
        ports:
          - "6379:6379"
    env:
      RAILS_ENV: test
      DATABASE_URL: "postgres://rails:password@localhost:5432/rails_test"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      # Install Ruby dependencies
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle install
      - name: Set up database schema
        run: bin/rails db:schema:load
      # Install JS dependencies
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          # cache: yarn
      - name: Install packages
        run: |
          yarn install --pure-lockfile
      - name: build assets
        run: bin/rails assets:precompile
      # Run tests
      - name: Run tests
        run: bundle exec rspec

  deploy:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: [lint_and_scan, test]
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mayisbikemonth/may_is_bike_month:${{ github.sha }}
            ghcr.io/mayisbikemonth/may_is_bike_month:latest
          labels: service=may_is_bike_month
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy with Kamal
        run: |
          cp .kamal/secrets-ci .kamal/secrets
          bundle exec kamal deploy --skip-push
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_SECRET: ${{ secrets.STRAVA_SECRET }}
          DEVISE_SECRET_KEY: ${{ secrets.DEVISE_SECRET_KEY }}
          DEVISE_PEPPER: ${{ secrets.DEVISE_PEPPER }}
